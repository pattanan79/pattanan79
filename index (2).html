<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จองคิวนัดหมาย</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Sarabun', 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #EFF6FF 0%, #F0F9FF 100%);
  min-height: 100vh;
  padding: 2rem 1rem;
  color: #1e3a5f;
}
.container { max-width: 560px; margin: 0 auto; }

.header { text-align: center; margin-bottom: 2rem; }
.header .logo {
  width: 64px; height: 64px; border-radius: 18px;
  background: #2563EB; color: #fff;
  font-size: 30px; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1rem;
}
.header h1 { font-size: 26px; font-weight: 700; color: #1e3a5f; margin-bottom: 4px; }
.header p { font-size: 15px; color: #5a7fa0; }

.card {
  background: #fff;
  border-radius: 18px;
  padding: 1.5rem;
  margin-bottom: 1rem;
  box-shadow: 0 2px 12px rgba(37,99,235,0.07);
}
.card-label {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: #2563EB; margin-bottom: 1rem;
  display: flex; align-items: center; gap: 6px;
}

input[type="date"] {
  width: 100%; padding: 12px 14px; font-size: 16px; font-family: inherit;
  border: 1.5px solid #DBEAFE; border-radius: 10px;
  background: #F8FBFF; color: #1e3a5f; cursor: pointer;
}
input[type="date"]:focus { outline: none; border-color: #2563EB; background: #fff; }

.time-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
}
.time-btn {
  padding: 10px 4px; font-size: 14px; font-family: inherit; font-weight: 600;
  border: 1.5px solid #DBEAFE; border-radius: 10px;
  background: #F8FBFF; color: #3a5a80;
  cursor: pointer; transition: all 0.12s; text-align: center;
}
.time-btn:hover { border-color: #2563EB; color: #2563EB; background: #EFF6FF; }
.time-btn.selected {
  border-color: #2563EB; background: #2563EB; color: #fff;
  box-shadow: 0 2px 8px rgba(37,99,235,0.25);
}

.field { margin-bottom: 1rem; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 14px; font-weight: 600; color: #3a5a80; margin-bottom: 6px; }
.field input {
  width: 100%; padding: 12px 14px; font-size: 16px; font-family: inherit;
  border: 1.5px solid #DBEAFE; border-radius: 10px;
  background: #F8FBFF; color: #1e3a5f;
}
.field input:focus { outline: none; border-color: #2563EB; background: #fff; }

.summary {
  background: #EFF6FF; border: 1.5px solid #BFDBFE;
  border-radius: 12px; padding: 14px 16px;
  font-size: 14px; color: #1D4ED8; margin-bottom: 1rem;
  line-height: 1.8; min-height: 52px;
}

.submit-btn {
  width: 100%; padding: 15px; font-size: 17px; font-family: inherit; font-weight: 700;
  border: none; border-radius: 12px;
  background: #2563EB; color: #fff; cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.02em;
}
.submit-btn:hover:not(:disabled) { background: #1D4ED8; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,0.35); }
.submit-btn:disabled { background: #93C5FD; cursor: not-allowed; transform: none; box-shadow: none; }

.success {
  display: none; text-align: center;
  background: #F0FDF4; border: 1.5px solid #86EFAC;
  border-radius: 16px; padding: 2rem; margin-top: 1rem;
}
.success .big-icon { font-size: 56px; margin-bottom: 12px; }
.success h2 { font-size: 22px; font-weight: 700; color: #15803D; margin-bottom: 8px; }
.success p { font-size: 15px; color: #16A34A; line-height: 1.7; }

.error-msg {
  display: none; background: #FFF1F2; border: 1.5px solid #FDA4AF;
  border-radius: 10px; padding: 12px 14px;
  font-size: 14px; color: #BE123C; margin-top: 10px;
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">📅</div>
    <h1>จองคิวนัดหมาย</h1>
    <p>เลือกวันและเวลาที่ต้องการ แล้วกรอกข้อมูลให้ครบ</p>
  </div>

  <div class="card">
    <div class="card-label">📆 เลือกวันที่นัดหมาย</div>
    <input type="date" id="booking-date" onchange="onUpdate()" />
  </div>

  <div class="card">
    <div class="card-label">🕐 เลือกช่วงเวลา</div>
    <div class="time-grid" id="time-grid"></div>
  </div>

  <div class="card">
    <div class="card-label">👤 ข้อมูลผู้จอง</div>
    <div class="field">
      <label for="name">ชื่อ-นามสกุล</label>
      <input type="text" id="name" placeholder="เช่น สมชาย ใจดี" oninput="onUpdate()" />
    </div>
    <div class="field">
      <label for="phone">เบอร์โทรศัพท์</label>
      <input type="tel" id="phone" placeholder="เช่น 0812345678" maxlength="10" oninput="onUpdate()" />
    </div>
  </div>

  <div class="summary" id="summary">กรุณาเลือกวันที่ เวลา และกรอกข้อมูลให้ครบ</div>

  <button class="submit-btn" id="submit-btn" onclick="submitBooking()" disabled>ยืนยันการจอง →</button>
  <div class="error-msg" id="error-msg"></div>

  <div class="success" id="success">
    <div class="big-icon">🎉</div>
    <h2>จองคิวสำเร็จแล้ว!</h2>
    <p id="success-detail"></p>
  </div>

</div>
<script>
var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxQTblJS6APsngry1u38sYgQaYpxGpbQ8zp-268UAmsnTjZzm8yq7l2qnjt6YG17r99/exec';
var selectedTime = null;

var grid = document.getElementById('time-grid');
for (var h = 8; h <= 20; h++) {
  var label = (h < 10 ? '0' : '') + h + ':00';
  (function(lbl) {
    var btn = document.createElement('button');
    btn.className = 'time-btn';
    btn.textContent = lbl;
    btn.onclick = function() {
      document.querySelectorAll('.time-btn').forEach(function(b){ b.classList.remove('selected'); });
      btn.classList.add('selected');
      selectedTime = lbl;
      onUpdate();
    };
    grid.appendChild(btn);
  })(label);
}

var today = new Date();
var yyyy = today.getFullYear(), mm = String(today.getMonth()+1).padStart(2,'0'), dd = String(today.getDate()).padStart(2,'0');
document.getElementById('booking-date').min = yyyy+'-'+mm+'-'+dd;
document.getElementById('booking-date').value = yyyy+'-'+mm+'-'+dd;

function thaiDate(s) {
  var d = new Date(s + 'T00:00:00');
  var days = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  var months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  return 'วัน'+days[d.getDay()]+' ที่ '+d.getDate()+' '+months[d.getMonth()]+' '+(d.getFullYear()+543);
}

function onUpdate() {
  var date = document.getElementById('booking-date').value;
  var name = document.getElementById('name').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var parts = [];
  if (date) parts.push('📆 ' + thaiDate(date));
  if (selectedTime) parts.push('🕐 เวลา ' + selectedTime + ' น.');
  if (name) parts.push('👤 ' + name);
  if (phone) parts.push('📞 ' + phone);
  document.getElementById('summary').innerHTML = parts.length ? parts.join('&nbsp; | &nbsp;') : 'กรุณาเลือกวันที่ เวลา และกรอกข้อมูลให้ครบ';
  document.getElementById('submit-btn').disabled = !(date && selectedTime && name && phone.length >= 9);
}

function submitBooking() {
  var date = document.getElementById('booking-date').value;
  var name = document.getElementById('name').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'กำลังส่งข้อมูล...';

  var url = SHEETS_URL + '?action=book'
    + '&name=' + encodeURIComponent(name)
    + '&phone=' + encodeURIComponent(phone)
    + '&date=' + encodeURIComponent(thaiDate(date))
    + '&time=' + encodeURIComponent(selectedTime + ' น.')
    + '&callback=cb';

  var script = document.createElement('script');
  window.cb = function(res) {
    if (res && res.status === 'ok') {
      document.getElementById('success').style.display = 'block';
      document.getElementById('success-detail').innerHTML = '<strong>' + name + '</strong><br>' + thaiDate(date) + '<br>เวลา ' + selectedTime + ' น.<br>📞 ' + phone;
      btn.style.display = 'none';
      document.getElementById('error-msg').style.display = 'none';
    } else {
      document.getElementById('error-msg').textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
      document.getElementById('error-msg').style.display = 'block';
      btn.disabled = false; btn.textContent = 'ยืนยันการจอง →';
    }
  };
  script.src = url;
  script.onerror = function() {
    document.getElementById('error-msg').textContent = 'เชื่อมต่อไม่ได้ กรุณาตรวจสอบ URL';
    document.getElementById('error-msg').style.display = 'block';
    btn.disabled = false; btn.textContent = 'ยืนยันการจอง →';
  };
  document.head.appendChild(script);
}
</script>
</body>
</html>
